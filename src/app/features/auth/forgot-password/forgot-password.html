<!-- Owner: Mina — feature: auth/forgot-password -->
<section class="auth">
  <h1>Forgot password</h1>
  <p class="auth__hint">We'll email you a verification code.</p>
  <form [formGroup]="form" (ngSubmit)="submit()" class="auth__form" novalidate>
    <label>
      <span>Email</span>
      <input type="email" formControlName="email" autocomplete="email" />
    </label>
    <button type="submit" [disabled]="submitting()">
      {{ submitting() ? 'Sending…' : 'Send code' }}
    </button>
    <p>
      <a routerLink="/auth/sign-in">Back to sign in</a>
    </p>
  </form>
</section>
