<!-- Owner: Mina — feature: auth/reset-password -->
<section class="auth-page">
  <div class="app-container auth-page__inner">
    <div class="auth-card">
      <h1 class="display-2 auth-card__title">Reset password</h1>
      <p class="lede">Enter the code we sent and choose a new password.</p>

      <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form" novalidate>
        <label class="field">
          <span class="field__label">Email</span>
          <input class="field__input" type="email" formControlName="email" autocomplete="email" />
          @if (form.controls.email.invalid && form.controls.email.touched) {
            <span class="field__error">Enter a valid email address.</span>
          }
        </label>

        <label class="field">
          <span class="field__label">Verification code</span>
          <input class="field__input" type="text" formControlName="resetCode" inputmode="numeric" autocomplete="one-time-code" />
          @if (form.controls.resetCode.invalid && form.controls.resetCode.touched) {
            <span class="field__error">Enter the verification code (4+ characters).</span>
          }
        </label>

        <label class="field">
          <span class="field__label">New password</span>
          <input class="field__input" type="password" formControlName="newPassword" autocomplete="new-password" />
          @if (form.controls.newPassword.invalid && form.controls.newPassword.touched) {
            <span class="field__error">New password must be at least 6 characters.</span>
          }
        </label>

        <button type="submit" class="btn-primary btn--block btn--lg" [disabled]="submitting()">
          {{ submitting() ? 'Resetting…' : 'Reset password' }}
        </button>

        <p class="auth-form__foot">
          <a routerLink="/auth/sign-in" class="btn-link">Back to sign in</a>
        </p>
      </form>
    </div>
  </div>
</section>
