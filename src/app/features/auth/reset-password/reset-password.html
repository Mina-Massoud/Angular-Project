<!-- Owner: Mina — feature: auth/reset-password -->
<section class="auth">
  <h1>Reset password</h1>
  <form [formGroup]="form" (ngSubmit)="submit()" class="auth__form" novalidate>
    <label>
      <span>Email</span>
      <input type="email" formControlName="email" autocomplete="email" />
    </label>
    <label>
      <span>Verification code</span>
      <input type="text" formControlName="resetCode" inputmode="numeric" autocomplete="one-time-code" />
    </label>
    <label>
      <span>New password</span>
      <input type="password" formControlName="newPassword" autocomplete="new-password" />
    </label>
    <button type="submit" [disabled]="submitting()">
      {{ submitting() ? 'Resetting…' : 'Reset password' }}
    </button>
    <p>
      <a routerLink="/auth/sign-in">Back to sign in</a>
    </p>
  </form>
</section>
