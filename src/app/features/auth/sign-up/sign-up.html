<!-- Owner: Mina — feature: auth/sign-up -->
<section class="auth">
  <h1>Create your account</h1>
  <form [formGroup]="form" (ngSubmit)="submit()" class="auth__form" novalidate>
    <label>
      <span>Name</span>
      <input type="text" formControlName="name" autocomplete="name" />
    </label>
    <label>
      <span>Email</span>
      <input type="email" formControlName="email" autocomplete="email" />
    </label>
    <label>
      <span>Password</span>
      <input type="password" formControlName="password" autocomplete="new-password" />
    </label>
    <label>
      <span>Confirm password</span>
      <input type="password" formControlName="rePassword" autocomplete="new-password" />
    </label>
    <label>
      <span>Phone</span>
      <input type="tel" formControlName="phone" autocomplete="tel" />
    </label>
    <button type="submit" [disabled]="submitting()">
      {{ submitting() ? 'Creating…' : 'Sign up' }}
    </button>
    <p>Already have an account? <a routerLink="/auth/sign-in">Sign in</a></p>
  </form>
</section>
