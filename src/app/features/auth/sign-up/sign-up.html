<!-- Owner: Mina — feature: auth/sign-up -->
<section class="auth-page">
  <div class="app-container auth-page__inner">
    <div class="auth-card">
      <h1 class="display-2 auth-card__title">Create your account</h1>
      <p class="lede">A few details and you're in.</p>

      <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form" novalidate>
        <label class="field">
          <span class="field__label">Name</span>
          <input class="field__input" type="text" formControlName="name" autocomplete="name" />
          @if (form.controls.name.invalid && form.controls.name.touched) {
            <span class="field__error">Name must be at least 3 characters.</span>
          }
        </label>

        <label class="field">
          <span class="field__label">Email</span>
          <input class="field__input" type="email" formControlName="email" autocomplete="email" />
          @if (form.controls.email.invalid && form.controls.email.touched) {
            <span class="field__error">Enter a valid email address.</span>
          }
        </label>

        <label class="field">
          <span class="field__label">Password</span>
          <input class="field__input" type="password" formControlName="password" autocomplete="new-password" />
          @if (form.controls.password.invalid && form.controls.password.touched) {
            <span class="field__error">Password must be at least 6 characters.</span>
          }
        </label>

        <label class="field">
          <span class="field__label">Confirm password</span>
          <input class="field__input" type="password" formControlName="rePassword" autocomplete="new-password" />
          @if (form.controls.rePassword.invalid && form.controls.rePassword.touched) {
            <span class="field__error">
              @if (form.controls.rePassword.errors?.['mismatch']) { Passwords do not match. }
              @else { Please confirm your password. }
            </span>
          }
        </label>

        <label class="field">
          <span class="field__label">Phone</span>
          <input class="field__input" type="tel" formControlName="phone" autocomplete="tel" placeholder="e.g. 01202448776" />
          @if (form.controls.phone.invalid && form.controls.phone.touched) {
            <span class="field__error">Enter a valid phone number (10–15 digits, optional +).</span>
          }
        </label>

        <button type="submit" class="btn-primary btn--block btn--lg" [disabled]="submitting()">
          {{ submitting() ? 'Creating…' : 'Sign up' }}
        </button>

        <p class="auth-form__foot">
          Already have an account? <a routerLink="/auth/sign-in" class="btn-link">Sign in</a>
        </p>
      </form>
    </div>
  </div>
</section>
