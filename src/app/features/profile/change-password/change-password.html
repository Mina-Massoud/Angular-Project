<!-- Owner: Mostafa Shanab — feature: profile/change-password -->
<section class="cp-page">
  <div class="app-container cp-page__inner">
    <a routerLink="/profile" class="cp-back">← Back to profile</a>

    <div class="surface cp-card">
      <h1 class="display-2 cp-card__title">Change password</h1>

      <form [formGroup]="form" (ngSubmit)="submit()" class="cp-form" novalidate>
        <label class="field">
          <span class="field__label">Current password</span>
          <input class="field__input" type="password" formControlName="currentPassword" autocomplete="current-password" />
          @if (form.controls.currentPassword.invalid && form.controls.currentPassword.touched) {
            <span class="field__error">Required, minimum 6 characters</span>
          }
        </label>

        <label class="field">
          <span class="field__label">New password</span>
          <input class="field__input" type="password" formControlName="password" autocomplete="new-password" />
          @if (form.controls.password.invalid && form.controls.password.touched) {
            <span class="field__error">Required, minimum 6 characters</span>
          }
        </label>

        <label class="field">
          <span class="field__label">Confirm new password</span>
          <input class="field__input" type="password" formControlName="rePassword" autocomplete="new-password" />
          @if (form.controls.rePassword.touched && form.hasError('passwordMismatch')) {
            <span class="field__error">Passwords do not match</span>
          }
        </label>

        <button type="submit" class="btn-primary btn--lg" [disabled]="submitting()">
          {{ submitting() ? 'Updating…' : 'Update password' }}
        </button>
      </form>
    </div>
  </div>
</section>
