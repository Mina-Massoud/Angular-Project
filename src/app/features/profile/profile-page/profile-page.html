<!-- Owner: Mostafa Shanab — feature: profile/profile-page -->
<section class="profile-page">
  <div class="app-container">
    <header class="hero">
      <h1 class="display-1 hero__title">My account</h1>
      <p class="lede hero__lede">Update your personal information, change your password, or manage saved addresses.</p>
    </header>

    <div class="profile-grid">
      <aside class="profile-nav">
        <a routerLink="/profile" routerLinkActive="is-active" [routerLinkActiveOptions]="{ exact: true }" class="profile-nav__link">Personal info</a>
        <a routerLink="/profile/change-password" routerLinkActive="is-active" class="profile-nav__link">Change password</a>
        <a routerLink="/profile/addresses" routerLinkActive="is-active" class="profile-nav__link">Addresses</a>
      </aside>

      <div class="surface profile-card">
        <h2 class="display-3 profile-card__title">Personal information</h2>

        <form [formGroup]="form" (ngSubmit)="submit()" class="profile-form" novalidate>
          <label class="field">
            <span class="field__label">Name</span>
            <input class="field__input" type="text" formControlName="name" autocomplete="name" />
            @if (form.controls.name.invalid && form.controls.name.touched) {
              <span class="field__error">Name must be at least 3 characters</span>
            }
          </label>

          <label class="field">
            <span class="field__label">Email</span>
            <input class="field__input" type="email" formControlName="email" autocomplete="email" />
            @if (form.controls.email.invalid && form.controls.email.touched) {
              <span class="field__error">Enter a valid email address</span>
            }
          </label>

          <label class="field">
            <span class="field__label">Phone</span>
            <input class="field__input" type="tel" formControlName="phone" autocomplete="tel" />
            @if (form.controls.phone.invalid && form.controls.phone.touched) {
              <span class="field__error">Enter a valid phone number (10–15 digits)</span>
            }
          </label>

          <div class="profile-actions">
            <button type="submit" class="btn-primary" [disabled]="submitting()">
              {{ submitting() ? 'Saving…' : 'Save changes' }}
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</section>
