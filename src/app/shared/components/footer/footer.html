<!-- Owner: Mostafa Shanab — feature: shared/footer -->
<footer class="footer">
  <div class="footer__grid">
    <div class="footer__col">
      <span class="footer__heading">Shop</span>
      @for (l of shopLinks; track l.label) {
        <a [routerLink]="l.path" class="footer__link">{{ l.label }}</a>
      }
    </div>
    <div class="footer__col">
      <span class="footer__heading">Account</span>
      @for (l of accountLinks; track l.label) {
        <a [routerLink]="l.path" class="footer__link">{{ l.label }}</a>
      }
    </div>
    <div class="footer__col">
      <span class="footer__heading">About</span>
      <p class="footer__copy">A weekly edit of considered objects, made slowly. Quality items at honest prices.</p>
    </div>
    <div class="footer__col footer__col--hide-mobile"></div>
  </div>

  <div class="footer__bottom">
    <a routerLink="/" class="footer__logo">Studio</a>
    <div class="footer__meta">
      <span>&copy; {{ year }} Studio</span>
      <span>All rights reserved</span>
    </div>
  </div>
</footer>
