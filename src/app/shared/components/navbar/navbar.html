<!-- Owner: Mostafa Shanab — feature: shared/navbar -->
<header class="navbar-wrapper">
  <!-- Top Bar -->
  <div class="navbar-top">
    <div class="container">
      <!-- Logo -->
      <a routerLink="/" class="logo">
        <span>🛍️</span>
        <span>SMART <strong>SHOP</strong></span>
      </a>

      <!-- Search -->
      <div class="search-bar">
        <input type="text" placeholder="Search products..." />
        <button>
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
          >
            <circle cx="11" cy="11" r="8" />
            <path d="m21 21-4.35-4.35" />
          </svg>
        </button>
      </div>

      <!-- Actions -->
      <div class="actions">
        <!-- Wishlist -->
        <a routerLink="/wishlist" class="icon-btn">
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"
            />
          </svg>
          @if (wishlistCount() > 0) {
            <span class="badge">{{ wishlistCount() }}</span>
          }
        </a>

        <!-- Cart -->
        <a routerLink="/cart" class="icon-btn cart">
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z" />
            <line x1="3" y1="6" x2="21" y2="6" />
            <path d="M16 10a4 4 0 0 1-8 0" />
          </svg>
          <span>BAG</span>
          @if (cartCount() > 0) {
            <span class="badge">{{ cartCount() }}</span>
          }
        </a>

        <!-- User -->
        <div class="user-wrap">
          <button class="user-btn" (click)="toggleUserMenu()">
            <div class="avatar">{{ userName[0] }}</div>
            <span>{{ userName }}</span>
            <svg
              width="12"
              height="12"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
            >
              <polyline points="6 9 12 15 18 9" />
            </svg>
          </button>

          @if (isUserMenuOpen()) {
            <div class="dropdown">
              <a routerLink="/profile" class="drop-item" (click)="isUserMenuOpen.set(false)"
                >My Profile</a
              >
              <a routerLink="/orders" class="drop-item" (click)="isUserMenuOpen.set(false)"
                >My Orders</a
              >
              <a routerLink="/wishlist" class="drop-item" (click)="isUserMenuOpen.set(false)"
                >Wishlist</a
              >
              <hr />
              <button class="drop-item danger" (click)="signOut()">Sign Out</button>
            </div>
          }
        </div>
      </div>
    </div>
  </div>

  <!-- Nav Links -->
  <nav class="navbar-nav">
    <div class="container">
      <ul>
        @for (link of navLinks; track link.path) {
          <li>
            <a [routerLink]="link.path" routerLinkActive="active" [class.sale]="link.highlight">{{
              link.label
            }}</a>
          </li>
        }
      </ul>
    </div>
  </nav>
</header>
