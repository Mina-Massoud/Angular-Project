<!-- Owner: Mina — feature: shared/pagination -->
@if (totalPages() > 1) {
  <nav class="pager" aria-label="Pagination">
    <button
      type="button"
      class="pager__edge"
      aria-label="Previous page"
      [disabled]="isPrevDisabled()"
      (click)="prev()"
    >
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 6l-6 6 6 6" />
      </svg>
      <span>Prev</span>
    </button>

    <ol class="pager__list">
      @for (item of items(); track $index) {
        @if (item === 'ellipsis') {
          <li class="pager__sep" aria-hidden="true">·&nbsp;·&nbsp;·</li>
        } @else {
          <li>
            <button
              type="button"
              class="pager__num"
              [class.is-active]="currentPage() === item"
              [attr.aria-current]="currentPage() === item ? 'page' : null"
              [attr.aria-label]="'Go to page ' + item"
              (click)="goTo(item)"
            >
              {{ item }}
            </button>
          </li>
        }
      }
    </ol>

    <button
      type="button"
      class="pager__edge"
      aria-label="Next page"
      [disabled]="isNextDisabled()"
      (click)="next()"
    >
      <span>Next</span>
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 6l6 6-6 6" />
      </svg>
    </button>
  </nav>
}
