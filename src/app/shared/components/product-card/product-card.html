<!-- Owner: Youssef — feature: shared/product-card -->
<a [routerLink]="['/products', product()._id]" class="product-card group cursor-pointer flex flex-col">
  <div class="product-img-wrapper relative aspect-[3/4] w-full overflow-hidden bg-paper-2 mb-5">
    @if (showNewDot()) {
      <span class="absolute top-4 left-4 z-10 w-2 h-2 rounded-full bg-rose shadow-[0_0_0_4px_rgba(246,244,240,0.5)]" aria-hidden="true"></span>
    }
    <img [src]="product().imageCover" [alt]="product().title"
      class="img-primary w-full h-full object-cover absolute inset-0" />
    @if (secondaryImage(); as alt) {
      <img [src]="alt" [alt]="product().title + ' alternate'"
        class="img-secondary w-full h-full object-cover absolute inset-0" />
    } @else {
      <div class="img-secondary w-full h-full absolute inset-0 bg-wash/30 backdrop-blur-[2px] flex items-center justify-center">
        <span class="text-xs uppercase tracking-widest text-ink/70">Quick View</span>
      </div>
    }
  </div>
  <div class="flex flex-col gap-1 px-1">
    <h3 class="text-sm font-sans font-normal text-ink card__title">{{ product().title }}</h3>
    <span class="text-sm font-serif text-muted tracking-tight">${{ displayPrice() }}</span>
  </div>
</a>
